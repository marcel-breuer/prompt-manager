name: Weekly Dependency Update

on:
  schedule:
  - cron: '0 3 * * 1'
  workflow_dispatch:


jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.9

    - name: Install and update dependencies
      run: |
        bun install --frozen-lockfile
        bun update

    - name: Create Pull Request
      id: cpr
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update bun dependencies'
        title: 'Update Bun Dependencies'
        body: |
          This PR updates the project dependencies with Bun.
        branch: 'update-dependencies'
        delete-branch: true
