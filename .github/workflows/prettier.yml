name: Run Prettier

on:
  push:
    branches:
    - main

jobs:
  prettier:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.9

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Run Prettier
      run: bun run prettier
