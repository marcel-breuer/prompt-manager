name: promptmanager

services:
  promptmanager-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: promptmanager-web
    env_file: .env
    environment:
      - POSTGRES_HOST=promptmanager-db
    expose:
      - "3000"
    restart: unless-stopped
    depends_on:
      promptmanager-db:
        condition: service_healthy

  promptmanager-db:
    image: postgres:17-alpine
    restart: always
    env_file: .env
    environment:
      - POSTGRES_DB=${POSTGRES_DATABASE}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - promptmanager_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  promptmanager_db_data:
