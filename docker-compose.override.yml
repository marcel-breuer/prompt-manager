services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    image: promptmanager-dev
    container_name: promptmanager-dev
    env_file: .env
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - POSTGRES_HOST=postgres
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    restart: "no"

  postgres:
    ports:
      - "5432:5432"
